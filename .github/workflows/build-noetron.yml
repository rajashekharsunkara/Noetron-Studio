name: Build Noetron Studio

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/noetron_**'
      - 'crates/zed/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev \
            libvulkan-dev libwayland-dev libssl-dev pkg-config \
            libfontconfig1-dev libasound2-dev libgtk-3-dev \
            clang mold

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build Noetron Studio binary
        run: |
          cargo build -p zed --release --jobs 2
        env:
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/zed dist/noetron-studio
          strip dist/noetron-studio
          tar -czf dist/noetron-studio-linux-x86_64.tar.gz -C dist noetron-studio

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noetron-studio-linux-x86_64
          path: dist/noetron-studio-linux-x86_64.tar.gz
          retention-days: 30
